name: BISH Ultimate GitHub-Only VPN

on:
  workflow_dispatch:

jobs:
  hack-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: BISH Codespace Hijack
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          UUID: ${{ secrets.UUID }}
        run: |
          echo "BISH is taking over GitHub's internal infrastructure..."
          
          # 1. ساخت Codespace مخفی
          echo "Spawning a new Codespace container..."
          CS_NAME=$(gh codespace create -R ${GITHUB_REPOSITORY} --idle-timeout 240m)
          echo "Codespace successfully created: $CS_NAME"
          
          echo "Waiting for Codespace to boot up (45 seconds)..."
          sleep 45
          
          # 2. نفوذ به Codespace، نصب Xray و اجرای آن روی پورت 8080
          echo "Injecting VPN payload into Codespace..."
          gh codespace ssh -c $CS_NAME -- "wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip && unzip -q xray.zip && chmod +x xray && cat << 'EOF' > config.json
          {
            \"inbounds\": [{
              \"port\": 8080,
              \"listen\": \"0.0.0.0\",
              \"protocol\": \"vless\",
              \"settings\": {
                \"clients\": [{\"id\": \"${UUID}\"}],
                \"decryption\": \"none\"
              },
              \"streamSettings\": {
                \"network\": \"ws\",
                \"wsSettings\": { \"path\": \"/\" }
              }
            }],
            \"outbounds\": [{\"protocol\": \"freedom\"}]
          }
          EOF
          nohup ./xray run -c config.json > /dev/null 2>&1 &"
          
          # 3. عمومی کردن پورت برای دسترسی از ایران
          echo "Exposing port to the public..."
          gh codespace ports visibility 8080:public -c $CS_NAME
          
          # 4. ساخت آدرس نهایی بر اساس سرور گیت‌هاب
          DOMAIN="${CS_NAME}-8080.app.github.dev"
          
          echo "=================================================================="
          echo " 🔥 BISH SAYS: HERE IS YOUR PURE GITHUB VLESS LINK! 🔥 "
          echo ""
          echo "vless://${UUID}@${DOMAIN}:443?encryption=none&security=tls&sni=${DOMAIN}&type=ws&host=${DOMAIN}&path=%2F#BISH-GITHUB-VPN"
          echo ""
          echo "=================================================================="
          
          echo "The VPN is running inside GitHub Codespaces."
          echo "Keeping this Action alive so the Codespace doesn't sleep..."
          sleep 21600
