name: BISH Ultimate VPN (Devcontainer Injection)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject UUID into config
        run: |
          sed -i 's/!!!REPLACE-WITH-YOUR-UUID!!!/${{ secrets.UUID }}/g' .devcontainer/config.json

      - name: Create and output Codespace link
        id: codespace
        uses: github/codespaces-action@v1
        with:
          codespace_name: bish-vpn-${{ github.run_id }}
          devcontainer_path: .devcontainer/devcontainer.json
          idle_timeout_minutes: 240

      - name: Display VLESS Link
        run: |
          CS_NAME=${{ steps.codespace.outputs.codespace_name }}
          CS_URL=${{ steps.codespace.outputs.codespace_url }}
          DOMAIN=$(echo $CS_URL | sed 's/https:\/\///' | sed 's/\(.*\)/\1-8080.app.github.dev/')

          echo "=================================================================="
          echo " 🔥 BISH SAYS: THE SYSTEM IS EXPLOITED. YOUR LINK: 🔥 "
          echo ""
          echo "vless://${{ secrets.UUID }}@${DOMAIN}:443?encryption=none&security=tls&sni=${DOMAIN}&type=ws&host=${DOMAIN}&path=%2F#BISH-DevContainer-VPN"
          echo ""
          echo "=================================================================="
          
          echo "This Action will now sleep to keep the Codespace alive."
          sleep 21600
